<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Search & Filter</title>

    <link rel="stylesheet" href="css/search-filter.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<div class="sidebar">

    <h1>CSC CRM</h1>

    <ul>

        <li onclick="window.location.href='dashboard.html'">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </li>

        <li onclick="window.location.href='student-attendance.html'">
            <i class="fa-solid fa-user-graduate"></i>
            Student Attendance
        </li>

        <li onclick="window.location.href='staff-attendance.html'">
            <i class="fa-solid fa-users"></i>
            Staff Attendance
        </li>

        <li onclick="window.location.href='reports.html'">
            <i class="fa-solid fa-chart-column"></i>
            Reports
        </li>

        <li class="active">
            <i class="fa-solid fa-magnifying-glass"></i>
            Search & Filter
        </li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <h2>Advanced Search & Filter</h2>

    </div>

    <div class="search-section">

        <!-- FILTERS -->

        <div class="filters">

            <input type="text" placeholder="Search Student">

            <select>
                <option>Attendance Status</option>
            </select>

            <input type="date">

            

            <button>
                Search
            </button>

        </div>

        <!-- RESULT TABLE -->

        <div class="table-section">

            <table>

                <thead>

                    <tr>

                        <th>Name</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th>Date</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>MS Dhoni</td>
                        <td>Python Full Stack</td>

                        <td>
                            <span class="present">
                                Present
                            </span>
                        </td>

                        <td>14-05-2026</td>

                    </tr>

                    <tr>

                        <td>Ruturaj Gaiwad</td>
                        <td>UI UX Design</td>

                        <td>
                            <span class="absent">
                                Absent
                            </span>
                        </td>

                        <td>14-05-2026</td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
